version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/data
      - GOTENBERG_URL=http://gotenberg:3000
      - BASE_URL=${BASE_URL:-http://localhost:3000}
    volumes:
      - pdf_data:/data
    depends_on:
      - gotenberg
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped
    command:
      - "gotenberg"
      - "--chromium-disable-javascript=false"
      - "--api-timeout=30s"
      - "--log-level=warn"

volumes:
  pdf_data:
